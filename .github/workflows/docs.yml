name: Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-javadoc:
    name: Deploy Javadoc
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Generate Javadoc
        run: mvn -pl tmdb-core javadoc:javadoc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tmdb-core/target/reports/apidocs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4